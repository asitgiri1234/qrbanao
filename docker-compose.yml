services:
  db:
    image: postgres:16-alpine
    container_name: qrbanao-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-qrbanao}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-qrbanao}
      POSTGRES_DB: ${POSTGRES_DB:-qrbanao}
    ports:
      - "5432:5432"
    volumes:
      - qrbanao_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-qrbanao}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: qrbanao-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-qrbanao}:${POSTGRES_PASSWORD:-qrbanao}@db:5432/${POSTGRES_DB:-qrbanao}?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-access}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api/v1}
    container_name: qrbanao-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api/v1}
    ports:
      - "3000:3000"

volumes:
  qrbanao_pgdata:
